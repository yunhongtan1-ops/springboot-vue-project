spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/ai_interview?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

security.jwt.secret=${AI_INTERVIEW_JWT_SECRET:ai-interview-jwt-secret-change-me-please-32-bytes}
security.jwt.access-token-expire-minutes=240

spring.ai.model.chat=${AI_INTERVIEW_REVIEW_CHAT_PROVIDER:none}
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.base-url=${OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${AI_INTERVIEW_REVIEW_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=${AI_INTERVIEW_REVIEW_TEMPERATURE:0.2}
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
